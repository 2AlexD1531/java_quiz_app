# config.yml
storage:
  type: memory  # Используйте memory для простоты

endpoints:
  - name: "Site HTTP"
    url: "http://${BASE_URL}"  # HTTP вместо HTTPS, если нет SSL
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      # Уберите или замените на реальный текст с вашего сайта:
      # - "[BODY] contains Welcome"
      # - "[BODY] contains Главная"
    alerts:
      - type: telegram
        enabled: true
        description: "❌ Сайт недоступен"
        send-on-resolved: true

  - name: "API Health Check"
    url: "http://backend:8080/api/health"  # Уберите :8080, т.к. Nginx проксирует
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      # Проверьте что возвращает ваш /api/health:
      # - "[BODY] contains healthy"  # Если возвращает {"status": "healthy"}
      # - "[BODY] contains UP"        # Если возвращает {"status": "UP"}
      - "[RESPONSE_TIME] < 5000"  # Увеличьте до 5 секунд
    alerts:
      - type: telegram
        enabled: true
        description: "❌ API недоступен"
        send-on-resolved: true

  - name: "Database Connection"
    url: "tcp://${DB_HOST}:${DB_PORT}"
    interval: 2m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: telegram
        enabled: true
        description: "❌ База данных недоступна"
        send-on-resolved: true

  - name: "Nginx Health"
    url: "http://${BASE_URL}/nginx-health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[BODY] contains nginx ok"


alerting:
  telegram:
    token: "${TELEGRAM_TOKEN}"
    id: "${TELEGRAM_CHAT}"
version: "3.8"
services:
  gatus:
    image: twinproduction/gatus:v5.8.0
    container_name: gatus
    command: ["--config", "/config/config.yml"]  # Важно!
    networks:
      - java_quiz_app_quiz_net
    env_file: ../.env

    environment:
      - GATUS_CONFIG_PATH=./config/config.yml
      - BASE_URL=${BASE_URL}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT=${TELEGRAM_CHAT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    volumes:
      - ./config.yml:/config/config.yml
    ports:
      - 127.0.0.1:8085:8080
    restart: unless-stopped

networks:
  quiz_net:
    external: true
    name: java_quiz_app_quiz_net
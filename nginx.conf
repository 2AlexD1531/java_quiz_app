events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;


    # Блокируем ботов по User-Agent
    map $http_user_agent $blocked_ua {
        default 0;
        ~*libredtail-http 1;
        ~*zgrab 1;
        ~*masscan 1;
        ~*nmap 1;
        ~*ThinkPHP 1;
        ~*Go-http-client 1;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        # Блокируем по User-Agent
        if ($blocked_ua) {
            return 444;
        }

        # Блокируем любые запросы к подозрительным путям
        location ~* ^/(admin|adminfuns|xmlrpc|wp-admin|wp-content|wp-includes|phpunit|eval-stdin|vendor|cgi-bin|\.env|\.git) {
            return 444;
        }

        # Главная страница
        location / {
            try_files $uri /index.html;
        }

        # Статика
        location ~ \.(js|css|html|ico)$ {
            try_files $uri =404;
        }

        # API
        location /api {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Хелсчек
        location /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "nginx ok\n";
        }
    }
}